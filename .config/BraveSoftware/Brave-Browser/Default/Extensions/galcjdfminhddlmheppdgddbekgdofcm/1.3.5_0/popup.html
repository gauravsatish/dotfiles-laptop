<!doctype html>
<html>
  <head>
    <title>Thumbnail Viewer for YouTube™</title>
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <link rel="stylesheet" href="popup.css" type="text/css" media="screen" />
  </head>
  <body>
    <div id="loading"></div>
    <div id="container">
      <p id="thumbnail-url"></p>
      <p id="thumbnail"></p>
      <p id="thumbnail-message">Click the thumbnail url above, or the thumbnail itself to view the full size!</p>
    </div>
    <script type="text/javascript" src="jquery.js"></script>
    <script type="text/javascript" src="popup.js"></script>
  </body>
</html>
